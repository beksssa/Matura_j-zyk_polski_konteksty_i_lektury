<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Matura Polski</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      line-height: 1.45;
    }

    button {
      cursor: pointer;
    }

    #quiz-content {
      margin-top: 12px;
    }

    .diagnostic-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 10px;
    }

    .quiz-item,
    .map-item {
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      user-select: none;
      background: #fff;
    }

    .quiz-item.selected {
      border-color: #000;
      background: #f7f7f7;
    }

    .item-main {
      flex: 1;
      cursor: pointer;
    }

    .icon-btn {
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    .small-note {
      margin: 0 0 10px;
      color: #555;
    }

    .task-card {
      max-width: 620px;
      margin: 0 auto;
      text-align: center;
      border: 1px solid #d0d0d0;
      border-radius: 18px;
      padding: 18px;
      background: #fff;
    }

    .task-head {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-profile-icon {
      font-size: 18px;
    }

    .task-swipe-instruction {
      font-size: 20px;
      margin-bottom: 12px;
      color: #444;
    }

    .task-image {
      height: 130px;
      border: 1px dashed #cfcfcf;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      background: #fafafa;
      margin: 12px 0 18px;
      color: #666;
    }

    .task-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .task-choice {
      flex: 1;
      min-height: 90px;
      border: 1px solid #d9d9d9;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      background: #fff;
    }

    .task-card.answered .task-choice {
      opacity: 0.95;
    }

    .task-choice:hover,
    .quiz-item:hover,
    .map-item:hover {
      background: #f8f8f8;
    }

    .task-card.answered {
      border-color: #000;
    }

    #nextBtn {
      margin-top: 12px;
    }

    @media (max-width: 760px) {
      .diagnostic-layout {
        grid-template-columns: 1fr;
      }

      .task-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<h1>📚 Matura Polski</h1>

<!-- 🟢 EKRAN 1 -->
<div id="screen-start">
  <h2>Wybierz tryb</h2>
  <button onclick="setMode('learning')">Nauka</button>
  <button onclick="setMode('quiz')">Ćwiczenia</button>
  <br><br>
  <button onclick="goScreen(2)">Dalej</button>
</div>

<!-- 🟡 EKRAN 2 -->
<div id="screen-mode" style="display:none;">
  <h2>Zakres</h2>
  <button onclick="setView('books')">Lektury</button>
  <button onclick="setView('motifs')">Motywy</button>
  <br><br>
  <button onclick="goScreen(3)">Dalej</button>
  <button onclick="goScreen(1)">Wstecz</button>
</div>

<!-- 🔵 EKRAN 3 -->
<div id="screen-epoch" style="display:none;">
  <h2>Filtr epok</h2>
  <div id="epochFilter"></div>
  <br>
  <button onclick="startApp()">START</button>
  <button onclick="goScreen(2)">Wstecz</button>
</div>

<!-- 🔴 MAPA -->
<div id="map" style="display:none;">
  <h2 id="map-title"></h2>
  <div id="list"></div>
  <button onclick="goScreen(1)">Menu</button>
</div>

<!-- 🔴 QUIZ -->
<div id="quiz" style="display:none;">
  <h2>Ćwiczenia diagnostyczne</h2>

  <div id="score">Score: 0</div>

  <div id="quiz-content"></div>

  <button id="nextBtn" onclick="nextTask()" style="display:none;">
    Dalej
  </button>

  <br>
  <button onclick="goScreen(1)">Koniec</button>
</div>

<!-- 🟣 PROFIL -->
<div id="profile" style="display:none;">
  <div id="profile-content"></div>
  <button onclick="returnFromProfile()">Powrót</button>
</div>

<script src="script.js"></script>

</body>
</html>
