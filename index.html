<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matura Polski</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --ink:#0a0a0a;
  --ink2:#1a1a1a;
  --muted:#888;
  --line:#e0e0e0;
  --line2:#c8c8c8;
  --ff-serif:'Cormorant Garamond',Georgia,serif;
  --ff-sans:'Jost',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,0,.2,1);
}

html,body{
  width:100%;min-height:100%;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--ff-sans);
  font-weight:300;
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

button{cursor:pointer;font-family:inherit;border:none;background:none;padding:0}

/* ═══ CANVAS TŁO ═══ */
#bg-canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
  transition:filter .7s var(--ease);
}
#bg-canvas.blurred{filter:blur(18px) opacity(.35)}
#bg-canvas.very-blurred{filter:blur(28px) opacity(.2)}

/* ═══ BACK ARROW ═══ */
#back-btn{
  position:fixed;top:22px;right:28px;
  z-index:100;
  display:none;
  align-items:center;gap:6px;
  font-family:var(--ff-sans);
  font-size:11px;
  font-weight:400;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
  cursor:pointer;
  transition:color .2s;
  padding:6px 0;
}
#back-btn.visible{display:flex}
#back-btn:hover{color:var(--ink)}
#back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;transition:transform .2s}
#back-btn:hover svg{transform:translateX(-3px)}

/* ═══ APP SHELL ═══ */
#app{
  position:relative;z-index:1;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem 1.5rem;
}

/* ═══ ONBOARDING PANELS ═══ */
.panel{
  position:absolute;
  width:100%;max-width:420px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  opacity:0;
  transform:scale(.97);
  pointer-events:none;
  transition:opacity .7s var(--ease),transform .7s var(--ease);
}
.panel.active{
  opacity:1;transform:scale(1);pointer-events:all;
  position:relative;
}
.panel.exit{
  opacity:0;transform:scale(1.03);pointer-events:none;
}

.panel-eyebrow{
  font-family:var(--ff-sans);
  font-size:9px;font-weight:400;
  letter-spacing:.28em;text-transform:uppercase;
  color:var(--muted);
  margin-bottom:2.2rem;
  text-align:center;
}

.panel-heading{
  font-family:var(--ff-serif);
  font-size:clamp(2.6rem,7vw,3.8rem);
  font-weight:300;
  line-height:1.05;
  letter-spacing:-.02em;
  color:var(--ink);
  text-align:center;
  margin-bottom:3rem;
}
.panel-heading em{font-style:italic;font-weight:300}

/* ═══ MODE TILES ═══ */
.mode-grid{
  width:100%;
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--line);
  border:1px solid var(--line);
  margin-bottom:0;
}

.mode-tile{
  background:var(--bg);
  padding:1.8rem 1.4rem 1.6rem;
  display:flex;flex-direction:column;
  align-items:flex-start;gap:.3rem;
  cursor:pointer;
  transition:background .25s var(--ease);
  position:relative;
  overflow:hidden;
}
.mode-tile::before{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--ink);
  transform:scaleX(0);transform-origin:left;
  transition:transform .35s var(--ease);
}
.mode-tile:hover{background:#f5f5f5}
.mode-tile.chosen{background:var(--ink)}
.mode-tile.chosen .tile-label,.mode-tile.chosen .tile-sub{color:var(--bg)}
.mode-tile.chosen::before{transform:scaleX(1);background:var(--bg)}

.tile-label{
  font-family:var(--ff-serif);
  font-size:1.5rem;font-weight:300;line-height:1;
  color:var(--ink);transition:color .25s;
}
.tile-sub{
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);transition:color .25s;
}

/* ═══ EPOCH SLIDERS ═══ */
.epoch-list{
  width:100%;
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px 20px;
  margin-bottom:2.8rem;
}

.epoch-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;cursor:pointer;padding:4px 0;
}
.epoch-name{
  font-family:var(--ff-sans);
  font-size:12px;font-weight:300;
  letter-spacing:.06em;text-transform:capitalize;
  color:var(--ink2);transition:color .2s;
}

.epoch-slider{
  position:relative;
  width:36px;height:20px;flex-shrink:0;
  cursor:pointer;
}
.epoch-slider-track{
  position:absolute;inset:0;
  border-radius:10px;
  background:var(--line);
  transition:background .3s var(--ease);
}
.epoch-slider-thumb{
  position:absolute;
  top:3px;left:3px;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--bg);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
  transition:transform .3s var(--ease),background .3s;
}
.epoch-row.on .epoch-slider-track{background:var(--ink)}
.epoch-row.on .epoch-slider-thumb{transform:translateX(16px)}
.epoch-row.on .epoch-name{color:var(--ink);font-weight:400}

/* ═══ QUIZ / MAP SHELLS ═══ */
#quiz-content{margin-top:12px}

.diagnostic-layout{
  display:grid;grid-template-columns:1fr 1fr;
  gap:14px;margin-top:10px;
}
.quiz-item,.map-item{
  border:1px solid var(--line);
  padding:10px 14px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:center;
  gap:10px;user-select:none;background:var(--bg);
  transition:background .15s;
}
.quiz-item.selected{border-color:var(--ink);background:#f8f8f8}
.quiz-item:hover,.map-item:hover{background:#f8f8f8}
.item-main{flex:1;cursor:pointer;font-size:14px}
.icon-btn{
  border:none;background:transparent;font-size:16px;
  cursor:pointer;padding:0 2px;line-height:1;
  color:var(--muted);transition:color .15s;
}
.icon-btn:hover{color:var(--ink)}
.small-note{margin:0 0 10px;color:var(--muted);font-size:13px}

/* ═══ TASK CARD ═══ */
.task-card{
  max-width:560px;margin:0 auto;text-align:center;
  border:1px solid var(--line);
  padding:28px 24px;background:var(--bg);
}
.task-head{
  font-family:var(--ff-serif);font-size:20px;font-weight:300;
  margin-bottom:12px;
  display:flex;justify-content:center;align-items:center;
  gap:8px;flex-wrap:wrap;
}
.task-swipe-instruction{
  font-size:16px;margin-bottom:12px;
  color:var(--muted);letter-spacing:.24em;
}
.task-image{
  height:110px;border:1px dashed var(--line);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:6px;background:#fafafa;
  margin:10px 0 16px;color:var(--muted);font-size:13px;
}
.task-row{display:flex;justify-content:space-between;gap:10px}
.task-choice{
  flex:1;min-height:76px;border:1px solid var(--line);
  padding:12px;display:flex;justify-content:center;
  align-items:center;text-align:center;
  cursor:pointer;background:var(--bg);font-size:14px;
  transition:background .15s,border-color .15s;
}
.task-choice:hover{background:#f5f5f5;border-color:var(--ink)}
.task-card.answered{border-color:var(--ink)}
.task-card.answered .task-choice{opacity:.9}

/* ═══ NEXT BTN ═══ */
#nextBtn{
  margin-top:14px;
  font-family:var(--ff-sans);font-size:11px;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--bg);background:var(--ink);
  border:1px solid var(--ink);
  padding:.75rem 2.2rem;
  cursor:pointer;transition:background .18s,opacity .18s;
  display:none;
}
#nextBtn:hover{background:#333}

/* ═══ QUIZ HEADER ═══ */
#quiz-header{
  width:100%;max-width:700px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem;padding-bottom:.8rem;
  border-bottom:1px solid var(--line);
}
#quiz-header h2{
  font-family:var(--ff-serif);font-size:1rem;font-weight:300;
  letter-spacing:.04em;color:var(--muted);
}
#score{
  font-size:11px;font-weight:400;
  letter-spacing:.16em;text-transform:uppercase;color:var(--ink);
}

/* ═══ OPEN TASKS (Y1/Y2) ═══ */
.open-task-shell{display:grid;gap:12px;text-align:left}
.open-task-topline{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.open-task-title{font-family:var(--ff-serif);font-size:1.4rem;font-weight:300;text-align:center;margin:0}
.open-task-visible-hint{border:1px solid var(--line);padding:12px;background:#fafafa;text-align:left}
.open-task-hidden-grid{display:grid;gap:8px}
.hint-card{border:1px solid var(--line);padding:12px;background:var(--bg);text-align:left}
.hint-card.revealed{background:#f8f8f8;border-color:var(--ink2)}
.hint-title{font-weight:400;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.hint-text{color:var(--ink);font-size:13px}
.hint-actions{margin-top:8px}
.hint-reveal-btn{
  border:1px solid var(--line);background:var(--bg);
  padding:5px 13px;font-family:var(--ff-sans);
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;transition:background .15s,border-color .15s;
}
.hint-reveal-btn:hover{background:#f5f5f5;border-color:var(--ink)}
.hint-reveal-btn:disabled{opacity:.3;cursor:not-allowed}
.open-task-input-wrap{display:grid;gap:6px}
.open-task-input-wrap label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.open-task-input{
  width:100%;box-sizing:border-box;
  border:1px solid var(--line);
  padding:11px 13px;font-size:15px;font-family:var(--ff-sans);
  background:var(--bg);color:var(--ink);
  transition:border-color .15s;outline:none;
}
.open-task-input:focus{border-color:var(--ink)}
.open-task-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.open-task-actions button{
  font-family:var(--ff-sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--bg);background:var(--ink);border:1px solid var(--ink);
  padding:.65rem 1.8rem;cursor:pointer;transition:background .18s;
}
.open-task-actions button:hover{background:#333}
.open-task-actions button:disabled{opacity:.35;cursor:not-allowed}
.task-feedback{min-height:20px;font-size:12px;font-weight:400;text-align:center;letter-spacing:.04em}
.task-feedback.ok{color:#1a4a2e}
.task-feedback.bad{color:#7a2a1a}

/* ═══ COVERS (Y2) ═══ */
.cover-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cover-card{border:1px solid var(--line);background:var(--bg);padding:10px;display:grid;gap:6px;justify-items:center}
.cover-visual{width:100%;min-height:130px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cover-visual img{width:100%;height:100%;object-fit:cover;display:block}
.cover-emoji{font-size:50px;line-height:1}
.cover-label{font-size:11px;color:var(--muted);text-align:center;letter-spacing:.04em}

/* ═══ TINDER CARD (X) ═══ */
.tinder-wrap{
  position:relative;width:100%;max-width:400px;
  margin:0 auto;display:flex;flex-direction:column;
  align-items:center;gap:14px;user-select:none;
}
.tinder-label{
  font-family:var(--ff-sans);font-size:10px;
  letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-align:center;
}
.tinder-question{
  font-family:var(--ff-serif);font-size:1.15rem;font-weight:300;
  text-align:center;color:var(--ink);line-height:1.3;
}
.tinder-card-stage{
  width:100%;position:relative;height:310px;
  display:flex;align-items:center;justify-content:center;
}
.tinder-card{
  position:absolute;width:240px;
  background:var(--bg);border:1px solid var(--line2);
  display:flex;flex-direction:column;overflow:hidden;
  cursor:grab;touch-action:none;will-change:transform;
  transition:box-shadow .2s;
}
.tinder-card:active{cursor:grabbing}
.tinder-card-img{width:100%;height:190px;object-fit:cover;display:block;background:#f0f0f0}
.tinder-card-img-placeholder{
  width:100%;height:190px;background:#f5f5f5;
  display:flex;align-items:center;justify-content:center;
  font-size:64px;line-height:1;
}
.tinder-card-name{
  padding:9px 12px;
  font-family:var(--ff-serif);font-size:1rem;font-weight:300;
  color:var(--ink);text-align:center;border-top:1px solid var(--line);
}
.tinder-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff-sans);font-size:10px;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;
  opacity:0;transition:opacity .1s;pointer-events:none;
}
.tinder-overlay-left{background:rgba(120,30,20,.07);color:#7a2010}
.tinder-overlay-right{background:rgba(20,50,30,.07);color:#1a3a20}
.tinder-choices{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tinder-choice{
  border:1px solid var(--line);padding:13px 10px;
  text-align:center;font-family:var(--ff-sans);
  font-size:12px;font-weight:300;color:var(--ink);
  background:var(--bg);cursor:pointer;
  transition:background .15s,border-color .15s;line-height:1.4;
}
.tinder-choice:hover{background:#f5f5f5;border-color:var(--ink)}
.tinder-choice.chosen-correct{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.tinder-choice.chosen-wrong{background:#7a2010;border-color:#7a2010;color:var(--bg)}
.tinder-choice.reveal-correct{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.tinder-hint{
  font-size:10px;color:var(--muted);text-align:center;
  letter-spacing:.12em;text-transform:uppercase;
}

/* ═══ PROFILE ═══ */
.profile-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);text-align:left}
.profile-section h3{
  font-family:var(--ff-sans);font-size:9px;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);margin:0 0 10px;font-weight:400;
}
.profile-chip-list{display:flex;flex-wrap:wrap;gap:6px}
.profile-chip{
  border:1px solid var(--line);padding:4px 10px;
  background:var(--bg);font-size:12px;color:var(--ink);
}
.profile-chip.clickable{cursor:pointer;transition:background .15s,border-color .15s}
.profile-chip.clickable:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.profile-media-list{display:grid;gap:6px}
.profile-media-item{border:1px solid var(--line);padding:8px 12px;background:var(--bg);font-size:13px}

/* profile image layout */
.profile-image-wide{
  width:50%;margin:14px auto 0;display:block;
}
.profile-image-wide img{width:100%;display:block;border:1px solid var(--line)}

.profile-two-col{display:grid;grid-template-columns:1fr 220px;gap:20px;align-items:start}
.profile-two-col-img img{width:100%;display:block;border:1px solid var(--line)}
.profile-two-col-text{}
.profile-image-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:8px;margin-top:6px;
}
.profile-image-item{
  width:100%;aspect-ratio:4/3;object-fit:cover;
  display:block;border:1px solid var(--line);
}
.profile-image-placeholder{
  width:100%;aspect-ratio:4/3;background:#f5f5f5;
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:32px;
}

/* ═══ MAP ═══ */
#map-title{
  font-family:var(--ff-serif);font-size:1.7rem;font-weight:300;
  margin-bottom:1rem;color:var(--ink);
}

/* ═══ BTN END ═══ */
.btn-end{
  font-family:var(--ff-sans);font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);
  background:transparent;border:1px solid var(--line);
  padding:.55rem 1.3rem;cursor:pointer;margin-top:10px;
  transition:color .15s,border-color .15s;
}
.btn-end:hover{color:var(--ink);border-color:var(--ink)}

/* ═══ DIAGNOSTIC CANVAS ═══ */
#diagnostic-canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:2;
  display:none;
}
#diagnostic-canvas.active{display:block}

/* diagnostic words */
.diag-word{
  position:fixed;
  font-family:var(--ff-serif);
  font-weight:300;
  color:var(--ink2);
  cursor:pointer;
  user-select:none;
  transition:color .2s,transform .1s;
  z-index:3;
  white-space:nowrap;
}
.diag-word:hover{color:#000}
.diag-word.book-word{font-style:normal}
.diag-word.motif-word{font-style:italic}
.diag-word.selected{color:#000;font-weight:400}
.diag-word.matched{color:var(--muted);pointer-events:none}

#diag-shell{
  position:fixed;inset:0;
  display:none;z-index:3;
}
#diag-shell.active{display:block}

#diag-controls{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}

/* ═══ RESPONSIVE ═══ */
@media(max-width:760px){
  .diagnostic-layout{grid-template-columns:1fr}
  .task-row{flex-direction:column}
  .epoch-list{grid-template-columns:1fr}
  .mode-grid{grid-template-columns:1fr}
  .profile-two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══ CANVAS TŁO ══ -->
<canvas id="bg-canvas"></canvas>

<!-- ══ DIAGNOSTIC SVG LINIE ══ -->
<svg id="diagnostic-canvas" xmlns="http://www.w3.org/2000/svg"></svg>

<!-- ══ BACK ARROW ══ -->
<button id="back-btn" onclick="handleBack()">
  <svg viewBox="0 0 16 16"><polyline points="10,3 5,8 10,13"/></svg>
  <span>Powrót</span>
</button>

<!-- ══ APP ══ -->
<div id="app">

  <!-- EKRAN 1: TRYB -->
  <div id="screen-start" class="panel active">
    <p class="panel-eyebrow">Matura · Język Polski</p>
    <h1 class="panel-heading">Jak chcesz<br><em>pracować?</em></h1>
    <div class="mode-grid">
      <div class="mode-tile" id="btn-learning" onclick="setModeAndAdvance('learning')">
        <span class="tile-label">Nauka</span>
        <span class="tile-sub">Przeglądaj materiał</span>
      </div>
      <div class="mode-tile" id="btn-quiz" onclick="setModeAndAdvance('quiz')">
        <span class="tile-label">Ćwiczenia</span>
        <span class="tile-sub">Sprawdź się</span>
      </div>
    </div>
  </div>

  <!-- EKRAN 2: ZAKRES -->
  <div id="screen-mode" class="panel">
    <p class="panel-eyebrow">Krok 2 z 3</p>
    <h1 class="panel-heading">Wybierz<br><em>zakres</em></h1>
    <div class="mode-grid">
      <div class="mode-tile chosen" id="btn-books" onclick="setViewAndAdvance('books')">
        <span class="tile-label">Lektury</span>
        <span class="tile-sub">Tytuły i autorzy</span>
      </div>
      <div class="mode-tile" id="btn-motifs" onclick="setViewAndAdvance('motifs')">
        <span class="tile-label">Motywy</span>
        <span class="tile-sub">Tematy i symbole</span>
      </div>
    </div>
  </div>

  <!-- EKRAN 3: EPOKI -->
  <div id="screen-epoch" class="panel">
    <p class="panel-eyebrow">Krok 3 z 3</p>
    <h1 class="panel-heading">Filtruj<br><em>epoki</em></h1>
    <div class="epoch-list" id="epochFilter"></div>
    <button class="btn-end" style="align-self:center;margin-bottom:0" onclick="startApp()">Start →</button>
  </div>

  <!-- MAPA -->
  <!-- ── MAPA ── -->
<div id="map" style="display:none;width:100%;max-width:700px">
  <h2 id="map-title" style="display:none"></h2>
  <div id="list" style="display:none"></div>
</div>
<!-- przycisk Menu dla mapy — poza #app żeby był fixed -->
<button id="map-menu-btn" onclick="goToMenu()">Menu</button>

  <!-- QUIZ -->

function initParticles() {
  resizeCanvas();
  particles = BG_WORDS.map((word, i) => {
    const font = FONTS[i % FONTS.length];
    ctx.font = font;
    const w = ctx.measureText(word).width;
    const h = 24;
    return {
      word, font,
      x: Math.random() * (window.innerWidth - w - 60) + 30,
      y: Math.random() * (window.innerHeight - 80) + 40,
      vx: (Math.random() - .5) * .12,   // bardzo wolno
      vy: (Math.random() - .5) * .09,
      alpha: Math.random() * .10 + .03,
      w, h,
    };
  });
}

// Kolizje — zatrzymaj nachodzenie
function resolveCollisions() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const dx = (a.x + a.w/2) - (b.x + b.w/2);
      const dy = (a.y + a.h/2) - (b.y + b.h/2);
      const minDx = (a.w + b.w)/2 + 10;
      const minDy = (a.h + b.h)/2 + 6;
      if (Math.abs(dx) < minDx && Math.abs(dy) < minDy) {
        // odbij
        const nx = dx / (Math.abs(dx) || 1);
        const ny = dy / (Math.abs(dy) || 1);
        a.vx += nx * .04; a.vy += ny * .04;
        b.vx -= nx * .04; b.vy -= ny * .04;
        // damp
        a.vx *= .92; a.vy *= .92;
        b.vx *= .92; b.vy *= .92;
      }
    }
  }
}

function drawBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    // clamp speed
    const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (spd > .18) { p.vx *= .18/spd; p.vy *= .18/spd; }
    // bounce walls
    if (p.x < 10) { p.x = 10; p.vx = Math.abs(p.vx); }
    if (p.x > canvas.width - p.w - 10) { p.x = canvas.width - p.w - 10; p.vx = -Math.abs(p.vx); }
    if (p.y < 20) { p.y = 20; p.vy = Math.abs(p.vy); }
    if (p.y > canvas.height - 20) { p.y = canvas.height - 20; p.vy = -Math.abs(p.vy); }
    ctx.font = p.font;
    ctx.fillStyle = `rgba(10,10,10,${p.alpha})`;
    ctx.fillText(p.word, p.x, p.y);
  });
  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', resizeCanvas);

let screenHistory = [];

function blurBg(level) {
  canvas.classList.remove('blurred','very-blurred');
  if (level === 'medium') canvas.classList.add('blurred');
  if (level === 'heavy') canvas.classList.add('very-blurred');
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => {
    if (p.classList.contains('active')) {
      p.classList.add('exit');
      p.classList.remove('active');
      setTimeout(() => p.classList.remove('exit'), 900);
    }
  });
  const panel = document.getElementById(id);
  if (panel) {
    setTimeout(() => {
      panel.classList.add('active');
      currentScreen = id;
    }, 100);
  }
}

function showView(id) {
  ['map','quiz','profile'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active','exit'));
  document.getElementById(id).style.display = 'block';
  currentScreen = id;
}

function updateBackBtn() {
  document.getElementById('back-btn').classList.toggle('visible', screenHistory.length > 0);
}

function pushScreen(id) {
  screenHistory.push(id || currentScreen);
  updateBackBtn();
}

function handleBack() {
  if (!screenHistory.length) return;
  const prev = screenHistory.pop();
  updateBackBtn();
  if (['screen-start','screen-mode','screen-epoch'].includes(prev)) {
    ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');
    stopDiagnostic();
    stopMapFloat();
    showPanel(prev);
    blurBg(prev === 'screen-start' ? 'none' : 'medium');
  } else if (prev === 'map') {
    showView('map');
    startMapFloat();
    blurBg('none');
  } else if (prev === 'quiz') {
    showView('quiz');
    restoreQuizState();
    blurBg('heavy');
  }
}

function goToMenu() {
  screenHistory = [];
  updateBackBtn();
  blurBg('none');
  ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');
  stopDiagnostic();
  stopMapFloat();
  showPanel('screen-start');
  document.getElementById('btn-learning').classList.remove('chosen');
  document.getElementById('btn-quiz').classList.remove('chosen');
}

window.goScreen = function(n) {
  if (n === 1) {
    screenHistory = []; updateBackBtn();
    blurBg('none');
    ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');

let mapWords = [];
let mapAnimFrame = null;

function stopMapFloat() {
  if (mapAnimFrame) { cancelAnimationFrame(mapAnimFrame); mapAnimFrame = null; }
  const shell = document.getElementById('map-float-shell');
  if (shell) shell.innerHTML = '';
  document.getElementById('map').style.display = 'none';
  document.getElementById('map-menu-btn').classList.remove('visible');
}

function startMapFloat() {
  const mapEl = document.getElementById('map');
  mapEl.style.display = 'block';
  document.getElementById('map-title').style.display = 'none';
  document.getElementById('list').style.display = 'none';

  // Pokaż przycisk Menu
  document.getElementById('map-menu-btn').classList.add('visible');

  let shell = document.getElementById('map-float-shell');
  if (!shell) {
    shell = document.createElement('div');
    shell.id = 'map-float-shell';
    shell.style.cssText = 'position:fixed;inset:0;z-index:4;pointer-events:none';
    document.body.appendChild(shell);
  }
  shell.innerHTML = '';
  mapWords = [];

  const items = view === 'books'
    ? getFilteredBooks().map(b => ({ id: b.id, label: b.title, type: 'book' }))
    : getFilteredMotifs().map(m => ({ id: m.id, label: m.name, type: 'motif' }));

  const W = window.innerWidth, H = window.innerHeight;

  items.forEach((item) => {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed;
      font-family:'Cormorant Garamond',serif;
      font-weight:${item.type==='book'?'600':'300'};
      font-style:${item.type==='motif'?'italic':'normal'};
      font-size:${16 + Math.random()*10}px;
      color:#0a0a0a;
      cursor:pointer;
      user-select:none;
      z-index:4;
      white-space:nowrap;
      pointer-events:all;
      opacity:.85;
      transition:opacity .2s, transform .2s;
    `;
    el.textContent = item.label;
    el.onclick = () => {
      // Animacja zoom-in przed przejściem do profilu
      el.style.transform = 'scale(1.18)';
      el.style.opacity = '1';
      setTimeout(() => {
        if (item.type === 'book') window.openBook(item.id);
        else window.openMotif(item.id);
      }, 220);
    };
    el.onmouseenter = () => { el.style.opacity = '1'; };
    el.onmouseleave = () => { el.style.opacity = '.85'; };
    shell.appendChild(el);

    const w = el.offsetWidth || item.label.length * 10;
    const h = 28;
    mapWords.push({
      el, item,
      x: Math.random() * (W - w - 40) + 20,
      y: Math.random() * (H - h - 80) + 40,
      vx: (Math.random() - .5) * .12,
      vy: (Math.random() - .5) * .09,
      w, h,
    });
  });

  if (mapAnimFrame) cancelAnimationFrame(mapAnimFrame);
  animateMapWords();
}

function resolveMapCollisions() {
  for (let i = 0; i < mapWords.length; i++) {
    for (let j = i+1; j < mapWords.length; j++) {
      const a = mapWords[i], b = mapWords[j];
      const dx = (a.x+a.w/2)-(b.x+b.w/2);
      const dy = (a.y+a.h/2)-(b.y+b.h/2);
      const minDx = (a.w+b.w)/2+14;
      const minDy = (a.h+b.h)/2+8;
      if (Math.abs(dx)<minDx && Math.abs(dy)<minDy) {
        const nx=dx/(Math.abs(dx)||1), ny=dy/(Math.abs(dy)||1);
        a.vx+=nx*.05; a.vy+=ny*.05;
        b.vx-=nx*.05; b.vy-=ny*.05;
        a.vx*=.9; a.vy*=.9; b.vx*=.9; b.vy*=.9;
      }
    }
  }
}

function animateMapWords() {
  const W = window.innerWidth, H = window.innerHeight;
  resolveMapCollisions();
  mapWords.forEach(w => {
    w.x += w.vx; w.y += w.vy;
    const spd = Math.sqrt(w.vx*w.vx+w.vy*w.vy);
    if (spd>.18){w.vx*=.18/spd;w.vy*=.18/spd;}
    if (w.x<10){w.x=10;w.vx=Math.abs(w.vx);}
    if (w.x>W-w.w-10){w.x=W-w.w-10;w.vx=-Math.abs(w.vx);}
    if (w.y<20){w.y=20;w.vy=Math.abs(w.vy);}
    if (w.y>H-w.h-60){w.y=H-w.h-60;w.vy=-Math.abs(w.vy);}
    w.el.style.left=w.x+'px';
    w.el.style.top=w.y+'px';
  });
  mapAnimFrame = requestAnimationFrame(animateMapWords);
}

// Smart image layout
function renderSmartImages(images, entityTitle) {
  if (!images||!images.length) return '';
  const img = images[0];
  if (!img?.src) return '';
  const id = 'si-'+Math.random().toString(36).slice(2);
  const src = escapeHtml(img.src);
  const alt = escapeHtml(img.alt||img.label||entityTitle||'');
  return `<div class="profile-section" id="${id}-sec"><h3>Obraz</h3><img id="${id}" src="${src}" alt="${alt}" style="display:none" onload="applySmartImg('${id}')" onerror="document.getElementById('${id}-sec').style.display='none'"></div>`;
}

window.applySmartImg = function(id) {
  const img = document.getElementById(id); if(!img) return;
  const w=img.naturalWidth, h=img.naturalHeight;
  img.style.display='';
  if (w>=h) {
    img.style.cssText='display:block;width:50%;max-width:100%;margin:8px auto 0;border:1px solid var(--line)';
  } else {
    const sec = document.getElementById(id+'-sec');
    const pc = document.getElementById('profile-content');
    if(!sec||!pc) return;
    img.remove(); sec.remove();
    const desc = pc.querySelector('p');
    const secs = [...pc.querySelectorAll('.profile-section')];
    const colR = document.createElement('div');
    colR.className='profile-two-col-img';
    const i2=document.createElement('img');
    i2.src=img.src; i2.alt=img.alt;
    i2.style.cssText='width:100%;display:block;border:1px solid var(--line)';
    colR.appendChild(i2);
    const colL=document.createElement('div');
    colL.className='profile-two-col-text';
    secs.slice(0,2).forEach(s=>colL.appendChild(s));
    const two=document.createElement('div');
    two.className='profile-two-col';
    two.style.marginTop='14px';
    two.appendChild(colL); two.appendChild(colR);
    if(desc&&desc.nextSibling) pc.insertBefore(two,desc.nextSibling);
    else pc.appendChild(two);
  }
};

function renderBookProfileNew(book) {
  const canGoBack = screenHistory.length > 1;
  const motifObjs = (book.motifs||[]).map(getMotifById).filter(Boolean);
  const chars = uniqueStrings(book.characters||[]);
  const quotes = uniqueStrings(book.quotes||[]);
  document.getElementById('profile-content').innerHTML = `
    <h2 style="font-family:var(--ff-serif);font-size:2rem;font-weight:300;margin-bottom:.5rem">📚 ${escapeHtml(book.title)}</h2>
    <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:.5rem">${escapeHtml(book.description||'')}</p>

// ═══════════════════════════════════════

let diagWords = [];
let diagSelected = null;
let diagPairs = [];   // { bookId, motifId, w1, w2 }  poprawne połączenia
let diagAnimFrame = null;
let diagSvg = null;

function stopDiagnostic() {
  if (diagAnimFrame) { cancelAnimationFrame(diagAnimFrame); diagAnimFrame = null; }

  diagSvg.innerHTML='';

  const container = document.getElementById('diag-words');

  diagWords=[]; diagSelected=null; diagPairs=[];

  const motifs = getFilteredMotifs();
  const all = [
    ...books.map(b=>({id:b.id,label:b.title,type:'book'})),
    ...motifs.map(m=>({id:m.id,label:m.name,type:'motif'})),
  ];

    el.style.top=(Math.random()*(H*0.72)+H*0.1)+'px';

    const h=parseFloat(el.style.fontSize)*1.3;
    diagWords.push({
      el, item,
      x:parseFloat(el.style.left), y:parseFloat(el.style.top),
      vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.22,
      w, h,
      stopped: false,
    });
  });

function resolveDiagCollisions() {
  // kolizje słów między sobą
  for (let i=0;i<diagWords.length;i++) {
    for (let j=i+1;j<diagWords.length;j++) {
      const a=diagWords[i],b=diagWords[j];
      if(a.stopped&&b.stopped) continue;
      const dx=(a.x+a.w/2)-(b.x+b.w/2);
      const dy=(a.y+a.h/2)-(b.y+b.h/2);
      const minDx=(a.w+b.w)/2+12;
      const minDy=(a.h+b.h)/2+7;
      if(Math.abs(dx)<minDx&&Math.abs(dy)<minDy){
        const nx=dx/(Math.abs(dx)||1),ny=dy/(Math.abs(dy)||1);
        if(!a.stopped){a.vx+=nx*.06;a.vy+=ny*.06;}
        if(!b.stopped){b.vx-=nx*.06;b.vy-=ny*.06;}
      }
    }
  }

  // kolizje słów z liniami (przybliżenie — odpychaj od segmentu)
  diagPairs.forEach(pair => {
    const w1=pair.w1, w2=pair.w2;
    const ax=w1.x+w1.w/2, ay=w1.y+w1.h/2;
    const bx=w2.x+w2.w/2, by=w2.y+w2.h/2;
    diagWords.forEach(w => {
      if(w===w1||w===w2||w.stopped) return;
      const cx=w.x+w.w/2, cy=w.y+w.h/2;
      // punkt najbliższy na segmencie ab
      const dx=bx-ax, dy=by-ay;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const t=Math.max(0,Math.min(1,((cx-ax)*dx+(cy-ay)*dy)/(len*len)));
      const nearX=ax+t*dx, nearY=ay+t*dy;
      const ndx=cx-nearX, ndy=cy-nearY;
      const dist=Math.sqrt(ndx*ndx+ndy*ndy);
      if(dist<30){
        const push=.08/Math.max(dist,.1);
        w.vx+=ndx*push; w.vy+=ndy*push;
      }
    });
  });
}

function animateDiag() {
  const W=window.innerWidth,H=window.innerHeight;
  resolveDiagCollisions();

  diagWords.forEach(w => {
    if(w.stopped) return;
    w.x+=w.vx; w.y+=w.vy;
    // speed cap
    const spd=Math.sqrt(w.vx*w.vx+w.vy*w.vy);
    if(spd>.3){w.vx*=.3/spd;w.vy*=.3/spd;}
    // walls
    if(w.x<10){w.x=10;w.vx=Math.abs(w.vx);}
    if(w.x>W-w.w-10){w.x=W-w.w-10;w.vx=-Math.abs(w.vx);}
    if(w.y<20){w.y=20;w.vy=Math.abs(w.vy);}
    if(w.y>H-w.h-70){w.y=H-w.h-70;w.vy=-Math.abs(w.vy);}
    w.el.style.left=w.x+'px';
    w.el.style.top=w.y+'px';
  });

  // Przerysuj dynamiczne linie połączeń
  updateDiagSvgLines();

  diagAnimFrame=requestAnimationFrame(animateDiag);
}

// Każda para ma element SVG line który aktualizujemy
const MAX_PAIR_DIST = 280; // max odległość między połączonymi słowami

function updateDiagSvgLines() {
  diagPairs.forEach(pair => {
    if (!pair.line) return;
    const c1 = getDiagCenter(pair.w1);
    const c2 = getDiagCenter(pair.w2);

    // Organiczna krzywa zamiast prostej linii
    const mx = (c1.x + c2.x) / 2;
    const my = (c1.y + c2.y) / 2;
    const dx = c2.x - c1.x;
    const dy = c2.y - c1.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // Wygięcie krzywej — prostopadle do linii, zależne od odległości
    const bend = Math.min(dist * .18, 40);
    const nx = -dy / (dist || 1);
    const ny = dx / (dist || 1);
    // Użyj fazy czasowej żeby krzywa "oddychała"
    const t = (Date.now() / 3000);
    const wave = Math.sin(t + pair.phase) * bend * .4;
    const cx = mx + nx * (bend + wave);
    const cy = my + ny * (bend + wave);

    // SVG path zamiast line
    if (pair.path) {
      pair.path.setAttribute('d', `M ${c1.x} ${c1.y} Q ${cx} ${cy} ${c2.x} ${c2.y}`);
    }

    // Siła gumy — jeśli za daleko, przyciągnij
    if (dist > MAX_PAIR_DIST) {
      const pull = (dist - MAX_PAIR_DIST) * 0.002;
      const ux = dx / dist, uy = dy / dist;
      if (!pair.w1.stopped) { pair.w1.vx += ux * pull; pair.w1.vy += uy * pull; }
      if (!pair.w2.stopped) { pair.w2.vx -= ux * pull; pair.w2.vy -= uy * pull; }
    }

    // Opacity zależna od dystansu — im dalej tym mocniej widać napięcie
    const tensionRatio = Math.min(dist / MAX_PAIR_DIST, 1);
    if (pair.path) {
      pair.path.setAttribute('opacity', (0.3 + tensionRatio * 0.4).toFixed(2));
    }
  });
}

function getDiagCenter(w) {
  return {x:w.x+w.w/2, y:w.y+w.h/2};
}

function handleDiagClick(item, el) {
  // Nie reaguj jeśli już jest w parze (dopasowanej) — chyba że może mieć więcej połączeń
  // Lektury mogą mieć wiele motywów i odwrotnie — nie blokujemy

  if (!diagSelected) {
    diagSelected = item.id;
    el.style.color='#000';
    el.style.transform='scale(1.08)';
    // zatrzymaj słowo
    const w=diagWords.find(d=>d.item.id===item.id);
    if(w){w.stopped=true;}
    return;
  }

  // Druga selekcja
  const firstW = diagWords.find(d=>d.item.id===diagSelected);
  const secondW = diagWords.find(d=>d.item.id===item.id);

  // Reset podświetlenia pierwszego
  if(firstW) {
    firstW.el.style.color='';
    firstW.el.style.transform='';
  }

  if(!firstW||!secondW||firstW.item.type===secondW.item.type) {
    // ten sam typ — anuluj i zacznij nową selekcję
    if(firstW) firstW.stopped=false;
    diagSelected=item.id;
    el.style.color='#000';
    el.style.transform='scale(1.08)';
    const w=diagWords.find(d=>d.item.id===item.id);
    if(w) w.stopped=true;
    return;
  }

  // Animacja łączącej linii (tymczasowej)
  const bookItem=firstW.item.type==='book'?firstW.item:secondW.item;
  const motifItem=firstW.item.type==='motif'?firstW.item:secondW.item;
  const bookW=firstW.item.type==='book'?firstW:secondW;
  const motifW=firstW.item.type==='motif'?firstW:secondW;

  const book=getBookById(bookItem.id);
  const isCorrect=book&&book.motifs.includes(motifItem.id);

  el.style.color=''; el.style.transform='';

  // Animowana linia "płynąca"
  animateConnectingLine(bookW, motifW, isCorrect, () => {
    if(isCorrect) {
      // Punkty
      if(!isScoredPair(bookItem.id,motifItem.id)) {
        score+=100;
        masteredPairs.add(makePairKey(bookItem.id,motifItem.id));
        scoredPairs.add(makePairKey(bookItem.id,motifItem.id));
        renderScore();
      }
      // Stała linia
     // Organiczna krzywa zamiast prostej linii
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('stroke','#0a0a0a');
      path.setAttribute('stroke-width','0.8');
      path.setAttribute('fill','none');
      path.setAttribute('opacity','0.4');
      diagSvg.appendChild(path);
      diagPairs.push({
        bookId: bookItem.id,
        motifId: motifItem.id,
        w1: bookW, w2: motifW,
        path,
        phase: Math.random() * Math.PI * 2,  // losowa faza dla organicznego ruchu
        line: null,
      });
      // Odblokuj ruch
      bookW.stopped=false; motifW.stopped=false;
      // Pokoloruj połączone
      bookW.el.style.color='var(--muted)';
      motifW.el.style.color='var(--muted)';
    } else {
      // Błąd — odblokuj i dolicz punkty
      if(!isScoredPair(bookItem.id,motifItem.id)) {
        score-=50;
        scoredPairs.add(makePairKey(bookItem.id,motifItem.id));
        renderScore();
      }
      bookW.stopped=false; motifW.stopped=false;
    }
  });

  diagSelected=null;
}

function animateConnectingLine(w1, w2, correct, onDone) {
  // Rysuj animowaną linię która "płynie" od w1 do w2
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  const c1=getDiagCenter(w1), c2=getDiagCenter(w2);
  line.setAttribute('x1',c1.x); line.setAttribute('y1',c1.y);
  line.setAttribute('x2',c1.x); line.setAttribute('y2',c1.y); // start: długość 0
  line.setAttribute('stroke', correct?'#0a0a0a':'#7a2010');
  line.setAttribute('stroke-width','1.2');
  line.setAttribute('stroke-dasharray','4 3');
  line.setAttribute('opacity','0.7');
  diagSvg.appendChild(line);

  const duration=420;
  const start=performance.now();

  function step(now) {
    const t=Math.min((now-start)/duration,1);
    const ex=c1.x+(c2.x-c1.x)*t;
    const ey=c1.y+(c2.y-c1.y)*t;
    line.setAttribute('x2',ex); line.setAttribute('y2',ey);
    if(t<1) { requestAnimationFrame(step); return; }

    // Linia dotarła
    if(!correct) {
      // Animacja rozpadu
      let alpha=0.7;
      let shake=0;
      const dissolve=()=>{
        alpha-=.06; shake=(Math.random()-.5)*4;
        line.setAttribute('opacity',alpha);
        line.setAttribute('transform',`translate(${shake},${shake})`);
        if(alpha>0) requestAnimationFrame(dissolve);
        else { line.remove(); onDone(); }
      };
      setTimeout(dissolve, 100);
    } else {
      line.remove();
      onDone();
    }
  }
  requestAnimationFrame(step);
}

          <div class="tinder-overlay-x right" id="overlayRight">Tak →</div>
          <div class="tinder-card-x-name">${escapeHtml(taskData.promptTitle)}</div>
        </div>
        <div class="tinder-hint-x">${answeredState?'':'przeciągnij lub kliknij opcję'}</div>
      </div>
      <div class="tinder-side">
        <div class="tinder-side-label">wybierz →</div>
        <div class="tinder-side-choice ${rightClass}" id="choice-right" onclick="${answeredState?'':'handleAnswer(\'right\')'}" style="${answeredState?'cursor:default':''}">
          ${escapeHtml(rightLabel)}
        </div>
      </div>
    </div>`;

  if(!answeredState) attachTinderXHandlers(taskData);
}

function attachTinderXHandlers(taskData) {
  const card=document.getElementById('tinderCard');
  if(!card) return;
  const overlayL=document.getElementById('overlayLeft');
  const overlayR=document.getElementById('overlayRight');
  let startX=null, currentX=0, dragging=false;

  function applyDrag(dx) {
    // Obrót względem dolnego rogu (lewego lub prawego)
    const dir=dx<0?'left':'right';
    const originX=dir==='left'?'left bottom':'right bottom';
    card.style.transformOrigin=originX;
    const rot=dx*0.10;
    card.style.transform=`translateX(${dx*0.6}px) rotate(${rot}deg)`;
    card.style.boxShadow=Math.abs(dx)>10?'0 12px 40px rgba(0,0,0,.15)':'';
    const ratio=Math.min(Math.abs(dx)/120,1);
    overlayL.style.opacity=dx<0?ratio:0;
    overlayR.style.opacity=dx>0?ratio:0;
  }

  function snapBack() {
    card.style.transition='transform .4s cubic-bezier(.4,0,.2,1), box-shadow .2s';
    card.style.transform='';
    card.style.boxShadow='';
    overlayL.style.opacity=0; overlayR.style.opacity=0;
    setTimeout(()=>{card.style.transition='';},420);
  }

  function flyOut(direction) {
    const tx=direction==='left'?-600:600;
    const rot=direction==='left'?-25:25;
    const originX=direction==='left'?'left bottom':'right bottom';
    card.style.transformOrigin=originX;
    card.style.transition='transform .42s cubic-bezier(.4,0,.2,1), opacity .42s';
    card.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
    card.style.opacity='0';
  }

  card.onpointerdown=(e)=>{
    if(answered) return;
    startX=e.clientX; currentX=0; dragging=true;
    card.style.transition='';
    card.setPointerCapture(e.pointerId);
  };
  card.onpointermove=(e)=>{
    if(!dragging||startX===null||answered) return;
    currentX=e.clientX-startX;
    applyDrag(currentX);
  };
  card.onpointerup=()=>{
    if(!dragging||answered) return;
    dragging=false;
    if(Math.abs(currentX)>90) {
      const side=currentX<0?'left':'right';
      flyOut(side);
      setTimeout(()=>handleAnswer(side),220);
    } else {
      snapBack();
    }
    startX=null;
  };
  card.onpointercancel=()=>{dragging=false;snapBack();startX=null;};
}

// Keyboard — z animacją flyOut
document.addEventListener('keydown',(e)=>{
  if(mode!=='quiz'||quizMode!=='engine'||!currentTask||answered||currentTaskType!=='X') return;
  const card=document.getElementById('tinderCard');
  if(!card) return;
  if(e.key==='ArrowLeft') {
    const dir='left';
    card.style.transformOrigin='left bottom';
    card.style.transition='transform .42s cubic-bezier(.4,0,.2,1), opacity .42s';
    card.style.transform='translateX(-600px) rotate(-25deg)';
    card.style.opacity='0';
    setTimeout(()=>handleAnswer(dir),220);
  }
  if(e.key==='ArrowRight') {
    const dir='right';
    card.style.transformOrigin='right bottom';
    card.style.transition='transform .42s cubic-bezier(.4,0,.2,1), opacity .42s';
    card.style.transform='translateX(600px) rotate(25deg)';
    card.style.opacity='0';
    setTimeout(()=>handleAnswer(dir),220);
  }
});
