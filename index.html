<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Matura Polski</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: #f4f4f6;
}

/* APP */
#app {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* 🌫 BACKGROUND */
#bg-layer {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: #f6f6f8;
}

/* floating words */
.bg-item {
  position: absolute;
  font-size: 18px;
  color: rgba(0,0,0,0.25);
  filter: blur(2px);
  opacity: 0.2;
}

/* 🎯 MAIN UI */
#focus-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* glass card */
.screen {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(16px);
  border-radius: 18px;
  padding: 30px;
  min-width: 320px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

/* buttons */
button {
  margin: 6px;
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

button.secondary {
  background: #ddd;
  color: black;
}
</style>
</head>

<body>

<div id="app">
  <div id="bg-layer"></div>
  <div id="focus-layer"></div>
</div>

<script src="script.js"></script>
</body>
</html>
