<script src="script.js"></script>
<script>
// ═══════════════════════════════════════
// CANVAS TŁO
// ═══════════════════════════════════════

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

const BG_WORDS = [
  ...data.books.map(b => b.title),
  ...data.motifs.map(m => m.name),
];

const FONTS = [
  '300 18px "Cormorant Garamond"',
  '300 italic 22px "Cormorant Garamond"',
  '400 15px "Cormorant Garamond"',
  '300 26px "Cormorant Garamond"',
  '300 italic 14px "Cormorant Garamond"',
  '600 16px "Cormorant Garamond"',
];

let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initParticles() {
  resizeCanvas();
  particles = BG_WORDS.map((word, i) => {
    const font = FONTS[i % FONTS.length];
    ctx.font = font;
    const w = ctx.measureText(word).width;
    const h = 24;
    return {
      word, font,
      x: Math.random() * (window.innerWidth - w - 60) + 30,
      y: Math.random() * (window.innerHeight - 80) + 40,
      vx: (Math.random() - .5) * .12,   // bardzo wolno
      vy: (Math.random() - .5) * .09,
      alpha: Math.random() * .10 + .03,
      w, h,
    };
  });
}

// Kolizje — zatrzymaj nachodzenie
function resolveCollisions() {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const dx = (a.x + a.w/2) - (b.x + b.w/2);
      const dy = (a.y + a.h/2) - (b.y + b.h/2);
      const minDx = (a.w + b.w)/2 + 10;
      const minDy = (a.h + b.h)/2 + 6;
      if (Math.abs(dx) < minDx && Math.abs(dy) < minDy) {
        // odbij
        const nx = dx / (Math.abs(dx) || 1);
        const ny = dy / (Math.abs(dy) || 1);
        a.vx += nx * .04; a.vy += ny * .04;
        b.vx -= nx * .04; b.vy -= ny * .04;
        // damp
        a.vx *= .92; a.vy *= .92;
        b.vx *= .92; b.vy *= .92;
      }
    }
  }
}

function drawBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  resolveCollisions();
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    // clamp speed
    const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (spd > .18) { p.vx *= .18/spd; p.vy *= .18/spd; }
    // bounce walls
    if (p.x < 10) { p.x = 10; p.vx = Math.abs(p.vx); }
    if (p.x > canvas.width - p.w - 10) { p.x = canvas.width - p.w - 10; p.vx = -Math.abs(p.vx); }
    if (p.y < 20) { p.y = 20; p.vy = Math.abs(p.vy); }
    if (p.y > canvas.height - 20) { p.y = canvas.height - 20; p.vy = -Math.abs(p.vy); }
    ctx.font = p.font;
    ctx.fillStyle = `rgba(10,10,10,${p.alpha})`;
    ctx.fillText(p.word, p.x, p.y);
  });
  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', resizeCanvas);
initParticles();
drawBg();

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════

let screenHistory = [];
let currentScreen = 'screen-start';

function blurBg(level) {
  canvas.classList.remove('blurred','very-blurred');
  if (level === 'medium') canvas.classList.add('blurred');
  if (level === 'heavy') canvas.classList.add('very-blurred');
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => {
    if (p.classList.contains('active')) {
      p.classList.add('exit');
      p.classList.remove('active');
      setTimeout(() => p.classList.remove('exit'), 900);
    }
  });
  const panel = document.getElementById(id);
  if (panel) {
    setTimeout(() => {
      panel.classList.add('active');
      currentScreen = id;
    }, 100);
  }
}

function showView(id) {
  ['map','quiz','profile'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active','exit'));
  document.getElementById(id).style.display = 'block';
  currentScreen = id;
}

function updateBackBtn() {
  document.getElementById('back-btn').classList.toggle('visible', screenHistory.length > 0);
}

function pushScreen(id) {
  screenHistory.push(id || currentScreen);
  updateBackBtn();
}

function handleBack() {
  if (!screenHistory.length) return;
  const prev = screenHistory.pop();
  updateBackBtn();
  if (['screen-start','screen-mode','screen-epoch'].includes(prev)) {
    ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');
    stopDiagnostic();
    stopMapFloat();
    showPanel(prev);
    blurBg(prev === 'screen-start' ? 'none' : 'medium');
  } else if (prev === 'map') {
    showView('map');
    startMapFloat();
    blurBg('none');
  } else if (prev === 'quiz') {
    showView('quiz');
    restoreQuizState();
    blurBg('heavy');
  }
}

function goToMenu() {
  screenHistory = [];
  updateBackBtn();
  blurBg('none');
  ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');
  stopDiagnostic();
  stopMapFloat();
  showPanel('screen-start');
  document.getElementById('btn-learning').classList.remove('chosen');
  document.getElementById('btn-quiz').classList.remove('chosen');
}

window.goScreen = function(n) {
  if (n === 1) {
    screenHistory = []; updateBackBtn();
    blurBg('none');
    ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');
    stopDiagnostic(); stopMapFloat();
    showPanel('screen-start');
  }
  if (n === 2) { pushScreen(currentScreen); blurBg('medium'); showPanel('screen-mode'); }
  if (n === 3) { pushScreen(currentScreen); blurBg('medium'); showPanel('screen-epoch'); renderEpochFilter(); }
};

window.setModeAndAdvance = function(m) {
  setMode(m);
  document.getElementById('btn-learning').classList.toggle('chosen', m==='learning');
  document.getElementById('btn-quiz').classList.toggle('chosen', m==='quiz');
  setTimeout(() => goScreen(2), 350);
};

window.setViewAndAdvance = function(v) {
  setView(v);
  document.getElementById('btn-books').classList.toggle('chosen', v==='books');
  document.getElementById('btn-motifs').classList.toggle('chosen', v==='motifs');
  setTimeout(() => goScreen(3), 350);
};

window.startApp = function() {
  pushScreen('screen-epoch');
  blurBg('heavy');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active','exit'));
  ['map','quiz','profile'].forEach(v => document.getElementById(v).style.display='none');
  if (mode === 'learning') {
    showView('map');
    startMapFloat();
  } else {
    showView('quiz');
    startQuiz();
  }
  updateBackBtn();
};

// ═══════════════════════════════════════
// MAP — pływające słowa
// ═══════════════════════════════════════

let mapWords = [];
let mapAnimFrame = null;

function stopMapFloat() {
  if (mapAnimFrame) { cancelAnimationFrame(mapAnimFrame); mapAnimFrame = null; }
  const shell = document.getElementById('map-float-shell');
  if (shell) shell.innerHTML = '';
  document.getElementById('map').style.display = 'none';
}

function startMapFloat() {
  const mapEl = document.getElementById('map');
  mapEl.style.display = 'block';

  // Ukryj stary list i tytuł
  document.getElementById('map-title').style.display = 'none';
  document.getElementById('list').style.display = 'none';

  // Utwórz shell dla pływających słów
  let shell = document.getElementById('map-float-shell');
  if (!shell) {
    shell = document.createElement('div');
    shell.id = 'map-float-shell';
    shell.style.cssText = 'position:fixed;inset:0;z-index:4;pointer-events:none';
    document.body.appendChild(shell);
  }
  shell.innerHTML = '';
  mapWords = [];

  const items = view === 'books'
    ? getFilteredBooks().map(b => ({ id: b.id, label: b.title, type: 'book' }))
    : getFilteredMotifs().map(m => ({ id: m.id, label: m.name, type: 'motif' }));

  const W = window.innerWidth, H = window.innerHeight;

  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed;
      font-family:'Cormorant Garamond',serif;
      font-weight:${item.type==='book'?'600':'300'};
      font-style:${item.type==='motif'?'italic':'normal'};
      font-size:${16 + Math.random()*10}px;
      color:#0a0a0a;
      cursor:pointer;
      user-select:none;
      z-index:4;
      white-space:nowrap;
      pointer-events:all;
      transition:opacity .2s;
      opacity:.85;
    `;
    el.textContent = item.label;
    el.onclick = () => {
      if (item.type === 'book') window.openBook(item.id);
      else window.openMotif(item.id);
    };
    el.onmouseenter = () => el.style.opacity = '1';
    el.onmouseleave = () => el.style.opacity = '.85';
    shell.appendChild(el);

    const w = el.offsetWidth || item.label.length * 10;
    const h = 28;
    mapWords.push({
      el, item,
      x: Math.random()*(W-w-40)+20,
      y: Math.random()*(H-h-80)+40,
      vx: (Math.random()-.5)*.12,
      vy: (Math.random()-.5)*.09,
      w, h,
    });
  });

  if (mapAnimFrame) cancelAnimationFrame(mapAnimFrame);
  animateMapWords();
}

function resolveMapCollisions() {
  for (let i = 0; i < mapWords.length; i++) {
    for (let j = i+1; j < mapWords.length; j++) {
      const a = mapWords[i], b = mapWords[j];
      const dx = (a.x+a.w/2)-(b.x+b.w/2);
      const dy = (a.y+a.h/2)-(b.y+b.h/2);
      const minDx = (a.w+b.w)/2+14;
      const minDy = (a.h+b.h)/2+8;
      if (Math.abs(dx)<minDx && Math.abs(dy)<minDy) {
        const nx=dx/(Math.abs(dx)||1), ny=dy/(Math.abs(dy)||1);
        a.vx+=nx*.05; a.vy+=ny*.05;
        b.vx-=nx*.05; b.vy-=ny*.05;
        a.vx*=.9; a.vy*=.9; b.vx*=.9; b.vy*=.9;
      }
    }
  }
}

function animateMapWords() {
  const W = window.innerWidth, H = window.innerHeight;
  resolveMapCollisions();
  mapWords.forEach(w => {
    w.x += w.vx; w.y += w.vy;
    const spd = Math.sqrt(w.vx*w.vx+w.vy*w.vy);
    if (spd>.18){w.vx*=.18/spd;w.vy*=.18/spd;}
    if (w.x<10){w.x=10;w.vx=Math.abs(w.vx);}
    if (w.x>W-w.w-10){w.x=W-w.w-10;w.vx=-Math.abs(w.vx);}
    if (w.y<20){w.y=20;w.vy=Math.abs(w.vy);}
    if (w.y>H-w.h-60){w.y=H-w.h-60;w.vy=-Math.abs(w.vy);}
    w.el.style.left=w.x+'px';
    w.el.style.top=w.y+'px';
  });
  mapAnimFrame = requestAnimationFrame(animateMapWords);
}

// ═══════════════════════════════════════
// PROFILE — blur
// ═══════════════════════════════════════

window.openBook = function(id) {
  pushScreen(currentScreen);
  updateBackBtn();
  if (mode==='quiz') quizSnapshot = captureQuizState();
  profileReturnTarget = mode==='quiz'?'quiz':'map';
  blurBg('medium');
  stopMapFloat();
  const book = getBookById(id); if(!book) return;
  showView('profile');
  renderBookProfileNew(book);
};

window.openMotif = function(id) {
  pushScreen(currentScreen);
  updateBackBtn();
  if (mode==='quiz') quizSnapshot = captureQuizState();
  profileReturnTarget = mode==='quiz'?'quiz':'map';
  blurBg('medium');
  stopMapFloat();
  const motif = getMotifById(id); if(!motif) return;
  showView('profile');
  renderMotifProfileNew(motif);
};

window.openBookFromProfile = id => window.openBook(id);
window.openMotifFromProfile = id => window.openMotif(id);

window.returnFromProfile = function() {
  if (!screenHistory.length) { goToMenu(); return; }
  handleBack();
};
window.goBackInProfile = window.returnFromProfile;

// Smart image layout
function renderSmartImages(images, entityTitle) {
  if (!images||!images.length) return '';
  const img = images[0];
  if (!img?.src) return '';
  const id = 'si-'+Math.random().toString(36).slice(2);
  const src = escapeHtml(img.src);
  const alt = escapeHtml(img.alt||img.label||entityTitle||'');
  return `<div class="profile-section" id="${id}-sec"><h3>Obraz</h3><img id="${id}" src="${src}" alt="${alt}" style="display:none" onload="applySmartImg('${id}')" onerror="document.getElementById('${id}-sec').style.display='none'"></div>`;
}

window.applySmartImg = function(id) {
  const img = document.getElementById(id); if(!img) return;
  const w=img.naturalWidth, h=img.naturalHeight;
  img.style.display='';
  if (w>=h) {
    img.style.cssText='display:block;width:50%;max-width:100%;margin:8px auto 0;border:1px solid var(--line)';
  } else {
    const sec = document.getElementById(id+'-sec');
    const pc = document.getElementById('profile-content');
    if(!sec||!pc) return;
    img.remove(); sec.remove();
    const desc = pc.querySelector('p');
    const secs = [...pc.querySelectorAll('.profile-section')];
    const colR = document.createElement('div');
    colR.className='profile-two-col-img';
    const i2=document.createElement('img');
    i2.src=img.src; i2.alt=img.alt;
    i2.style.cssText='width:100%;display:block;border:1px solid var(--line)';
    colR.appendChild(i2);
    const colL=document.createElement('div');
    colL.className='profile-two-col-text';
    secs.slice(0,2).forEach(s=>colL.appendChild(s));
    const two=document.createElement('div');
    two.className='profile-two-col';
    two.style.marginTop='14px';
    two.appendChild(colL); two.appendChild(colR);
    if(desc&&desc.nextSibling) pc.insertBefore(two,desc.nextSibling);
    else pc.appendChild(two);
  }
};

function renderBookProfileNew(book) {
  const canGoBack = screenHistory.length > 1;
  const motifObjs = (book.motifs||[]).map(getMotifById).filter(Boolean);
  const chars = uniqueStrings(book.characters||[]);
  const quotes = uniqueStrings(book.quotes||[]);
  document.getElementById('profile-content').innerHTML = `
    <h2 style="font-family:var(--ff-serif);font-size:2rem;font-weight:300;margin-bottom:.5rem">📚 ${escapeHtml(book.title)}</h2>
    <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:.5rem">${escapeHtml(book.description||'')}</p>
    <div class="profile-section"><h3>Epoka</h3><div class="profile-chip-list"><span class="profile-chip">${escapeHtml(book.epoch||'')}</span></div></div>
    ${motifObjs.length?`<div class="profile-section"><h3>Motywy</h3><div class="profile-chip-list">${motifObjs.map(m=>`<span class="profile-chip clickable" onclick="openMotifFromProfile('${m.id}')">🎯 ${escapeHtml(m.name)}</span>`).join('')}</div></div>`:''}
    ${chars.length?`<div class="profile-section"><h3>Bohaterowie</h3><div class="profile-chip-list">${chars.map(c=>`<span class="profile-chip">${escapeHtml(c)}</span>`).join('')}</div></div>`:''}
    ${quotes.length?`<div class="profile-section"><h3>Cytaty</h3><div class="profile-media-list">${quotes.map(q=>`<div class="profile-media-item">„${escapeHtml(q)}"</div>`).join('')}</div></div>`:''}
    ${renderSmartImages(book.images,book.title)}
    <br><button class="btn-end" onclick="${canGoBack?'goBackInProfile()':'returnFromProfile()'}">⬅ ${profileReturnTarget==='quiz'?'Powrót do ćwiczeń':'Powrót'}</button>`;
}

function renderMotifProfileNew(motif) {
  const canGoBack = screenHistory.length > 1;
  const bookObjs = (motif.books||[]).map(getBookById).filter(Boolean);
  document.getElementById('profile-content').innerHTML = `
    <h2 style="font-family:var(--ff-serif);font-size:2rem;font-weight:300;margin-bottom:.5rem">🎯 ${escapeHtml(motif.name)}</h2>
    <p style="color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:.5rem">${escapeHtml(motif.description||'')}</p>
    ${bookObjs.length?`<div class="profile-section"><h3>Lektury z tym motywem</h3><div class="profile-chip-list">${bookObjs.map(b=>`<span class="profile-chip clickable" onclick="openBookFromProfile('${b.id}')">📚 ${escapeHtml(b.title)}</span>`).join('')}</div></div>`:''}
    ${renderSmartImages(motif.images,motif.name)}
    <br><button class="btn-end" onclick="${canGoBack?'goBackInProfile()':'returnFromProfile()'}">⬅ ${profileReturnTarget==='quiz'?'Powrót do ćwiczeń':'Powrót'}</button>`;
}

// ═══════════════════════════════════════
// EPOCH SLIDERS
// ═══════════════════════════════════════

window.renderEpochFilter = function() {
  const el = document.getElementById('epochFilter');
  el.innerHTML = '';
  epochs.forEach(e => {
    const on = activeEpochs.has(e);
    el.innerHTML += `<div class="epoch-row ${on?'on':''}" onclick="toggleEpochSlider('${e}',this)">
      <span class="epoch-name">${e}</span>
      <div class="epoch-slider"><div class="epoch-slider-track"></div><div class="epoch-slider-thumb"></div></div>
    </div>`;
  });
};

window.toggleEpochSlider = function(epoch, row) {
  if (activeEpochs.has(epoch)) { activeEpochs.delete(epoch); row.classList.remove('on'); }
  else { activeEpochs.add(epoch); row.classList.add('on'); }
};

// ═══════════════════════════════════════
// DIAGNOSTYKA — pływające słowa + linie SVG
// ═══════════════════════════════════════

let diagWords = [];
let diagSelected = null;
let diagPairs = [];   // { bookId, motifId, w1, w2 }  poprawne połączenia
let diagAnimFrame = null;
let diagSvg = null;

function stopDiagnostic() {
  if (diagAnimFrame) { cancelAnimationFrame(diagAnimFrame); diagAnimFrame = null; }
  document.getElementById('diag-shell').classList.remove('active');
  const svg = document.getElementById('diagnostic-canvas');
  if (svg) { svg.style.display='none'; svg.innerHTML=''; }
}

window.renderDiagnostic = function() {
  document.getElementById('quiz').style.display='none';
  const shell = document.getElementById('diag-shell');
  shell.classList.add('active');
  blurBg('heavy');

  diagSvg = document.getElementById('diagnostic-canvas');
  diagSvg.style.display='block';
  diagSvg.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:2';
  diagSvg.innerHTML='';

  const container = document.getElementById('diag-words');
  container.innerHTML='';
  document.getElementById('diagNextBtn').style.display='inline-block';

  diagWords=[]; diagSelected=null; diagPairs=[];

  const books = getFilteredBooks();
  const motifs = getFilteredMotifs();
  const all = [
    ...books.map(b=>({id:b.id,label:b.title,type:'book'})),
    ...motifs.map(m=>({id:m.id,label:m.name,type:'motif'})),
  ];

  const W=window.innerWidth, H=window.innerHeight;

  all.forEach((item,i) => {
    const el = document.createElement('div');
    el.className=`diag-word ${item.type==='book'?'book-word':'motif-word'}`;
    el.textContent=item.label;
    const size = item.type==='book'?(15+Math.random()*5):(13+Math.random()*6);
    el.style.fontSize=size+'px';
    // bold dla lektur
    el.style.fontWeight = item.type==='book'?'600':'300';
    el.style.fontStyle = item.type==='motif'?'italic':'normal';
    el.style.left=(Math.random()*(W*0.78)+W*0.11)+'px';
    el.style.top=(Math.random()*(H*0.72)+H*0.1)+'px';
    el.style.cursor='pointer';
    el.style.transition='transform .15s, color .15s';
    el.onclick=()=>handleDiagClick(item,el);
    container.appendChild(el);

    const w=el.offsetWidth||item.label.length*9;
    const h=parseFloat(el.style.fontSize)*1.3;
    diagWords.push({
      el, item,
      x:parseFloat(el.style.left), y:parseFloat(el.style.top),
      vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.22,
      w, h,
      stopped: false,
    });
  });

  if (diagAnimFrame) cancelAnimationFrame(diagAnimFrame);
  animateDiag();
};

function resolveDiagCollisions() {
  // kolizje słów między sobą
  for (let i=0;i<diagWords.length;i++) {
    for (let j=i+1;j<diagWords.length;j++) {
      const a=diagWords[i],b=diagWords[j];
      if(a.stopped&&b.stopped) continue;
      const dx=(a.x+a.w/2)-(b.x+b.w/2);
      const dy=(a.y+a.h/2)-(b.y+b.h/2);
      const minDx=(a.w+b.w)/2+12;
      const minDy=(a.h+b.h)/2+7;
      if(Math.abs(dx)<minDx&&Math.abs(dy)<minDy){
        const nx=dx/(Math.abs(dx)||1),ny=dy/(Math.abs(dy)||1);
        if(!a.stopped){a.vx+=nx*.06;a.vy+=ny*.06;}
        if(!b.stopped){b.vx-=nx*.06;b.vy-=ny*.06;}
      }
    }
  }

  // kolizje słów z liniami (przybliżenie — odpychaj od segmentu)
  diagPairs.forEach(pair => {
    const w1=pair.w1, w2=pair.w2;
    const ax=w1.x+w1.w/2, ay=w1.y+w1.h/2;
    const bx=w2.x+w2.w/2, by=w2.y+w2.h/2;
    diagWords.forEach(w => {
      if(w===w1||w===w2||w.stopped) return;
      const cx=w.x+w.w/2, cy=w.y+w.h/2;
      // punkt najbliższy na segmencie ab
      const dx=bx-ax, dy=by-ay;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const t=Math.max(0,Math.min(1,((cx-ax)*dx+(cy-ay)*dy)/(len*len)));
      const nearX=ax+t*dx, nearY=ay+t*dy;
      const ndx=cx-nearX, ndy=cy-nearY;
      const dist=Math.sqrt(ndx*ndx+ndy*ndy);
      if(dist<30){
        const push=.08/Math.max(dist,.1);
        w.vx+=ndx*push; w.vy+=ndy*push;
      }
    });
  });
}

function animateDiag() {
  const W=window.innerWidth,H=window.innerHeight;
  resolveDiagCollisions();

  diagWords.forEach(w => {
    if(w.stopped) return;
    w.x+=w.vx; w.y+=w.vy;
    // speed cap
    const spd=Math.sqrt(w.vx*w.vx+w.vy*w.vy);
    if(spd>.3){w.vx*=.3/spd;w.vy*=.3/spd;}
    // walls
    if(w.x<10){w.x=10;w.vx=Math.abs(w.vx);}
    if(w.x>W-w.w-10){w.x=W-w.w-10;w.vx=-Math.abs(w.vx);}
    if(w.y<20){w.y=20;w.vy=Math.abs(w.vy);}
    if(w.y>H-w.h-70){w.y=H-w.h-70;w.vy=-Math.abs(w.vy);}
    w.el.style.left=w.x+'px';
    w.el.style.top=w.y+'px';
  });

  // Przerysuj dynamiczne linie połączeń
  updateDiagSvgLines();

  diagAnimFrame=requestAnimationFrame(animateDiag);
}

// Każda para ma element SVG line który aktualizujemy
function updateDiagSvgLines() {
  diagPairs.forEach(pair => {
    if(!pair.line) return;
    const c1=getDiagCenter(pair.w1), c2=getDiagCenter(pair.w2);
    pair.line.setAttribute('x1',c1.x); pair.line.setAttribute('y1',c1.y);
    pair.line.setAttribute('x2',c2.x); pair.line.setAttribute('y2',c2.y);
  });
}

function getDiagCenter(w) {
  return {x:w.x+w.w/2, y:w.y+w.h/2};
}

function handleDiagClick(item, el) {
  // Nie reaguj jeśli już jest w parze (dopasowanej) — chyba że może mieć więcej połączeń
  // Lektury mogą mieć wiele motywów i odwrotnie — nie blokujemy

  if (!diagSelected) {
    diagSelected = item.id;
    el.style.color='#000';
    el.style.transform='scale(1.08)';
    // zatrzymaj słowo
    const w=diagWords.find(d=>d.item.id===item.id);
    if(w){w.stopped=true;}
    return;
  }

  // Druga selekcja
  const firstW = diagWords.find(d=>d.item.id===diagSelected);
  const secondW = diagWords.find(d=>d.item.id===item.id);

  // Reset podświetlenia pierwszego
  if(firstW) {
    firstW.el.style.color='';
    firstW.el.style.transform='';
  }

  if(!firstW||!secondW||firstW.item.type===secondW.item.type) {
    // ten sam typ — anuluj i zacznij nową selekcję
    if(firstW) firstW.stopped=false;
    diagSelected=item.id;
    el.style.color='#000';
    el.style.transform='scale(1.08)';
    const w=diagWords.find(d=>d.item.id===item.id);
    if(w) w.stopped=true;
    return;
  }

  // Animacja łączącej linii (tymczasowej)
  const bookItem=firstW.item.type==='book'?firstW.item:secondW.item;
  const motifItem=firstW.item.type==='motif'?firstW.item:secondW.item;
  const bookW=firstW.item.type==='book'?firstW:secondW;
  const motifW=firstW.item.type==='motif'?firstW:secondW;

  const book=getBookById(bookItem.id);
  const isCorrect=book&&book.motifs.includes(motifItem.id);

  el.style.color=''; el.style.transform='';

  // Animowana linia "płynąca"
  animateConnectingLine(bookW, motifW, isCorrect, () => {
    if(isCorrect) {
      // Punkty
      if(!isScoredPair(bookItem.id,motifItem.id)) {
        score+=100;
        masteredPairs.add(makePairKey(bookItem.id,motifItem.id));
        scoredPairs.add(makePairKey(bookItem.id,motifItem.id));
        renderScore();
      }
      // Stała linia
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      const c1=getDiagCenter(bookW), c2=getDiagCenter(motifW);
      line.setAttribute('x1',c1.x);line.setAttribute('y1',c1.y);
      line.setAttribute('x2',c2.x);line.setAttribute('y2',c2.y);
      line.setAttribute('stroke','#0a0a0a');
      line.setAttribute('stroke-width','0.8');
      line.setAttribute('opacity','0.5');
      diagSvg.appendChild(line);
      diagPairs.push({bookId:bookItem.id,motifId:motifItem.id,w1:bookW,w2:motifW,line});
      // Odblokuj ruch
      bookW.stopped=false; motifW.stopped=false;
      // Pokoloruj połączone
      bookW.el.style.color='var(--muted)';
      motifW.el.style.color='var(--muted)';
    } else {
      // Błąd — odblokuj i dolicz punkty
      if(!isScoredPair(bookItem.id,motifItem.id)) {
        score-=50;
        scoredPairs.add(makePairKey(bookItem.id,motifItem.id));
        renderScore();
      }
      bookW.stopped=false; motifW.stopped=false;
    }
  });

  diagSelected=null;
}

function animateConnectingLine(w1, w2, correct, onDone) {
  // Rysuj animowaną linię która "płynie" od w1 do w2
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  const c1=getDiagCenter(w1), c2=getDiagCenter(w2);
  line.setAttribute('x1',c1.x); line.setAttribute('y1',c1.y);
  line.setAttribute('x2',c1.x); line.setAttribute('y2',c1.y); // start: długość 0
  line.setAttribute('stroke', correct?'#0a0a0a':'#7a2010');
  line.setAttribute('stroke-width','1.2');
  line.setAttribute('stroke-dasharray','4 3');
  line.setAttribute('opacity','0.7');
  diagSvg.appendChild(line);

  const duration=420;
  const start=performance.now();

  function step(now) {
    const t=Math.min((now-start)/duration,1);
    const ex=c1.x+(c2.x-c1.x)*t;
    const ey=c1.y+(c2.y-c1.y)*t;
    line.setAttribute('x2',ex); line.setAttribute('y2',ey);
    if(t<1) { requestAnimationFrame(step); return; }

    // Linia dotarła
    if(!correct) {
      // Animacja rozpadu
      let alpha=0.7;
      let shake=0;
      const dissolve=()=>{
        alpha-=.06; shake=(Math.random()-.5)*4;
        line.setAttribute('opacity',alpha);
        line.setAttribute('transform',`translate(${shake},${shake})`);
        if(alpha>0) requestAnimationFrame(dissolve);
        else { line.remove(); onDone(); }
      };
      setTimeout(dissolve, 100);
    } else {
      line.remove();
      onDone();
    }
  }
  requestAnimationFrame(step);
}

function attachTinderXHandlers(taskData) {
  const card=document.getElementById('tinderCard');
  if(!card) return;
  const overlayL=document.getElementById('overlayLeft');
  const overlayR=document.getElementById('overlayRight');
  let startX=null, currentX=0, dragging=false;

  function applyDrag(dx) {
    // Obrót względem dolnego rogu (lewego lub prawego)
    const dir=dx<0?'left':'right';
    const originX=dir==='left'?'left bottom':'right bottom';
    card.style.transformOrigin=originX;
    const rot=dx*0.10;
    card.style.transform=`translateX(${dx*0.6}px) rotate(${rot}deg)`;
    card.style.boxShadow=Math.abs(dx)>10?'0 12px 40px rgba(0,0,0,.15)':'';
    const ratio=Math.min(Math.abs(dx)/120,1);
    overlayL.style.opacity=dx<0?ratio:0;
    overlayR.style.opacity=dx>0?ratio:0;
  }

  function snapBack() {
    card.style.transition='transform .4s cubic-bezier(.4,0,.2,1), box-shadow .2s';
    card.style.transform='';
    card.style.boxShadow='';
    overlayL.style.opacity=0; overlayR.style.opacity=0;
    setTimeout(()=>{card.style.transition='';},420);
  }

  function flyOut(direction) {
    const tx=direction==='left'?-600:600;
    const rot=direction==='left'?-25:25;
    const originX=direction==='left'?'left bottom':'right bottom';
    card.style.transformOrigin=originX;
    card.style.transition='transform .42s cubic-bezier(.4,0,.2,1), opacity .42s';
    card.style.transform=`translateX(${tx}px) rotate(${rot}deg)`;
    card.style.opacity='0';
  }

  card.onpointerdown=(e)=>{
    if(answered) return;
    startX=e.clientX; currentX=0; dragging=true;
    card.style.transition='';
    card.setPointerCapture(e.pointerId);
  };
  card.onpointermove=(e)=>{
    if(!dragging||startX===null||answered) return;
    currentX=e.clientX-startX;
    applyDrag(currentX);
  };
  card.onpointerup=()=>{
    if(!dragging||answered) return;
    dragging=false;
    if(Math.abs(currentX)>90) {
      const side=currentX<0?'left':'right';
      flyOut(side);
      setTimeout(()=>handleAnswer(side),220);
    } else {
      snapBack();
    }
    startX=null;
  };
  card.onpointercancel=()=>{dragging=false;snapBack();startX=null;};
}

  setNextButtonVisible(!!taskData.submitted);
}
