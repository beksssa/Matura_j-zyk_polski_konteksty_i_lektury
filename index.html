<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Matura Polski</title>
<style>
body{font-family:Arial,sans-serif;padding:16px;line-height:1.45}
button{cursor:pointer}
#quiz-content{margin-top:12px}
.diagnostic-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.quiz-item,.map-item{border:1px solid #d0d0d0;border-radius:12px;padding:10px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;user-select:none;background:#fff}
.quiz-item.selected{border-color:#000;background:#f7f7f7}
.item-main{flex:1;cursor:pointer}
.icon-btn{border:none;background:transparent;font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
.small-note{margin:0 0 10px;color:#555}
.task-card{max-width:620px;margin:0 auto;text-align:center;border:1px solid #d0d0d0;border-radius:18px;padding:18px;background:#fff}
.task-head{font-size:22px;font-weight:700;margin-bottom:12px;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap}
.task-profile-icon{font-size:18px}
.task-swipe-instruction{font-size:20px;margin-bottom:12px;color:#444}
.task-image{height:130px;border:1px dashed #cfcfcf;border-radius:14px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px;background:#fafafa;margin:12px 0 18px;color:#666}
.task-row{display:flex;justify-content:space-between;gap:12px}
.task-choice{flex:1;min-height:90px;border:1px solid #d9d9d9;border-radius:14px;padding:12px;display:flex;justify-content:center;align-items:center;text-align:center;cursor:pointer;background:#fff}
.task-card.answered .task-choice{opacity:.95}
.task-choice:hover,.quiz-item:hover,.map-item:hover{background:#f8f8f8}
.task-card.answered{border-color:#000}
#nextBtn{margin-top:12px}
.open-task-shell{display:grid;gap:12px;text-align:left}
.open-task-topline{font-size:14px;color:#666;text-transform:uppercase;letter-spacing:.04em}
.open-task-title{font-size:22px;font-weight:700;text-align:center;margin:0}
.open-task-visible-hint{border:1px solid #d7d7d7;border-radius:14px;padding:12px;background:#fafafa;text-align:left}
.open-task-hidden-grid{display:grid;gap:10px}
.hint-card{border:1px solid #d9d9d9;border-radius:14px;padding:12px;background:#fff;text-align:left}
.hint-card.revealed{background:#f8f8f8}
.hint-title{font-weight:700;margin-bottom:6px}
.hint-text{color:#333}
.hint-actions{margin-top:8px}
.hint-reveal-btn{border:1px solid #cfcfcf;background:#fff;border-radius:999px;padding:8px 12px;cursor:pointer}
.hint-reveal-btn:disabled{opacity:.45;cursor:not-allowed}
.open-task-input-wrap{display:grid;gap:8px}
.open-task-input{width:100%;box-sizing:border-box;border:1px solid #cfcfcf;border-radius:12px;padding:12px 14px;font-size:16px}
.open-task-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.task-feedback{min-height:22px;font-weight:700;text-align:center}
.task-feedback.ok{color:#126b2f}
.task-feedback.bad{color:#a11}
.cover-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cover-card{border:1px solid #d9d9d9;border-radius:16px;background:#fff;padding:12px;display:grid;gap:8px;justify-items:center}
.cover-visual{width:100%;min-height:160px;border-radius:12px;background:#f3f3f3;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cover-visual img{width:100%;height:100%;object-fit:cover;display:block}
.cover-emoji{font-size:64px;line-height:1}
.cover-label{font-size:14px;color:#444;text-align:center}
.profile-section{margin-top:14px;padding-top:14px;border-top:1px solid #e5e5e5;text-align:left}
.profile-section h3{margin:0 0 8px}
.profile-chip-list{display:flex;flex-wrap:wrap;gap:8px}
.profile-chip{border:1px solid #d5d5d5;border-radius:999px;padding:6px 10px;background:#fafafa;font-size:14px}
.profile-chip.clickable{cursor:pointer}
.profile-chip.clickable:hover{background:#f0f0f0;border-color:#aaa}
.profile-media-list{display:grid;gap:8px}
.profile-media-item{border:1px solid #dcdcdc;border-radius:12px;padding:10px 12px;background:#fff}
@media(max-width:760px){.diagnostic-layout{grid-template-columns:1fr}.task-row{flex-direction:column}}
</style>
</head>
<body>

<h1>📚 Matura Polski</h1>

<!-- 🟢 EKRAN 1 -->
<div id="screen-start">
  <h2>Wybierz tryb</h2>
  <button onclick="setMode('learning')">Nauka</button>
  <button onclick="setMode('quiz')">Ćwiczenia</button>
  <br><br>
  <button onclick="goScreen(2)">Dalej</button>
</div>

<!-- 🟡 EKRAN 2 -->
<div id="screen-mode" style="display:none">
  <h2>Zakres</h2>
  <button onclick="setView('books')">Lektury</button>
  <button onclick="setView('motifs')">Motywy</button>
  <br><br>
  <button onclick="goScreen(3)">Dalej</button>
  <button onclick="goScreen(1)">Wstecz</button>
</div>

<!-- 🔵 EKRAN 3 -->
<div id="screen-epoch" style="display:none">
  <h2>Filtr epok</h2>
  <div id="epochFilter"></div>
  <br>
  <button onclick="startApp()">START</button>
  <button onclick="goScreen(2)">Wstecz</button>
</div>

<!-- 🔴 MAPA -->
<div id="map" style="display:none">
  <h2 id="map-title"></h2>
  <div id="list"></div>
  <button onclick="goScreen(1)">Menu</button>
</div>

<!-- 🔴 QUIZ -->
<div id="quiz" style="display:none">
  <h2>Ćwiczenia diagnostyczne</h2>
  <div id="score">Score: 0</div>
  <div id="quiz-content"></div>
  <button id="nextBtn" onclick="nextTask()" style="display:none">Dalej</button>
  <br>
  <button onclick="goScreen(1)">Koniec</button>
</div>

<!-- 🟣 PROFIL -->
<div id="profile" style="display:none">
  <div id="profile-content"></div>
</div>

<script src="script.js"></script>
</body>
</html>
