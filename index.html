<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matura Polski</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:   #f7f4ef;
  --ink:     #1a1a18;
  --muted:   #7a7870;
  --green:   #2d4a3e;
  --green-l: #3d6454;
  --line:    #d8d4cc;
  --white:   #ffffff;
  --ff-serif: 'Cormorant Garamond', Georgia, serif;
  --ff-sans:  'Jost', sans-serif;
  --ease:    cubic-bezier(.4,0,.2,1);
}

html, body {
  min-height: 100%;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--ff-sans);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

button { cursor: pointer; font-family: inherit; }

/* ── LAYOUT WRAPPER ── */
#app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}

/* ── ONBOARDING SCREENS ── */
.onboard-screen {
  width: 100%;
  max-width: 480px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: fadeUp .45s var(--ease) both;
}
.onboard-screen.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* eyebrow */
.screen-eyebrow {
  font-family: var(--ff-sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.4rem;
}

/* main heading */
.screen-heading {
  font-family: var(--ff-serif);
  font-size: clamp(2.4rem, 6vw, 3.4rem);
  font-weight: 300;
  line-height: 1.1;
  letter-spacing: -.01em;
  color: var(--ink);
  text-align: center;
  margin-bottom: 2.8rem;
}
.screen-heading em {
  font-style: italic;
  color: var(--green);
}

/* ── CHOICE CARDS ── */
.choice-group {
  display: grid;
  width: 100%;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  margin-bottom: 2.4rem;
}
.choice-group.cols-2 { grid-template-columns: 1fr 1fr; }
.choice-group.cols-1 { grid-template-columns: 1fr; }

.choice-btn {
  background: var(--white);
  border: none;
  padding: 1.5rem 1.25rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: .35rem;
  text-align: left;
  transition: background .18s var(--ease);
  position: relative;
  overflow: hidden;
}
.choice-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--green);
  opacity: 0;
  transition: opacity .18s var(--ease);
  pointer-events: none;
}
.choice-btn:hover { background: var(--cream); }
.choice-btn.active {
  background: var(--green);
}
.choice-btn.active .choice-label,
.choice-btn.active .choice-sub { color: var(--white); }

.choice-label {
  font-family: var(--ff-serif);
  font-size: 1.4rem;
  font-weight: 300;
  line-height: 1;
  color: var(--ink);
  transition: color .18s;
}
.choice-sub {
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color .18s;
}

/* ── EPOCH GRID ── */
.epoch-grid {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  margin-bottom: 2.4rem;
}
.epoch-btn {
  background: var(--white);
  border: none;
  padding: 1rem 1.1rem;
  text-align: left;
  font-family: var(--ff-sans);
  font-size: 13px;
  font-weight: 300;
  letter-spacing: .06em;
  color: var(--muted);
  text-transform: capitalize;
  transition: background .15s, color .15s;
}
.epoch-btn:hover { background: var(--cream); color: var(--ink); }
.epoch-btn.active {
  background: var(--ink);
  color: var(--white);
}

/* ── NAV ROW ── */
.nav-row {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.nav-row.centered { justify-content: center; }

.btn-primary {
  font-family: var(--ff-sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--ink);
  border: 1px solid var(--ink);
  padding: .85rem 2.2rem;
  transition: background .18s, color .18s;
}
.btn-primary:hover {
  background: var(--green);
  border-color: var(--green);
}

.btn-ghost {
  font-family: var(--ff-sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: 1px solid var(--line);
  padding: .85rem 1.6rem;
  transition: color .18s, border-color .18s;
}
.btn-ghost:hover { color: var(--ink); border-color: var(--ink); }

/* step counter */
.step-indicator {
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── QUIZ / MAP / PROFILE (unchanged layout, refined style) ── */
#quiz-content { margin-top: 12px; }

.diagnostic-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 10px;
}

.quiz-item, .map-item {
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 10px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  user-select: none;
  background: var(--white);
  transition: background .15s;
}
.quiz-item.selected { border-color: var(--ink); background: var(--cream); }
.quiz-item:hover, .map-item:hover { background: var(--cream); }

.item-main { flex: 1; cursor: pointer; font-size: 14px; }
.icon-btn { border: none; background: transparent; font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1; color: var(--muted); }
.icon-btn:hover { color: var(--ink); }
.small-note { margin: 0 0 10px; color: var(--muted); font-size: 13px; }

.task-card {
  max-width: 620px;
  margin: 0 auto;
  text-align: center;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 24px 20px;
  background: var(--white);
}
.task-head {
  font-family: var(--ff-serif);
  font-size: 22px;
  font-weight: 300;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.task-profile-icon { font-size: 16px; }
.task-swipe-instruction { font-size: 18px; margin-bottom: 12px; color: var(--muted); letter-spacing: .2em; }
.task-image {
  height: 120px;
  border: 1px dashed var(--line);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 6px;
  background: var(--cream);
  margin: 12px 0 18px;
  color: var(--muted);
  font-size: 13px;
}
.task-row { display: flex; justify-content: space-between; gap: 10px; }
.task-choice {
  flex: 1;
  min-height: 80px;
  border: 1px solid var(--line);
  padding: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  background: var(--white);
  font-size: 14px;
  transition: background .15s, border-color .15s;
}
.task-choice:hover { background: var(--cream); border-color: var(--ink); }
.task-card.answered { border-color: var(--ink); }
.task-card.answered .task-choice { opacity: .9; }

#nextBtn {
  margin-top: 14px;
  font-family: var(--ff-sans);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--ink);
  border: 1px solid var(--ink);
  padding: .75rem 2rem;
  cursor: pointer;
  transition: background .18s;
}
#nextBtn:hover { background: var(--green); border-color: var(--green); }

/* quiz header bar */
#quiz-header {
  width: 100%;
  max-width: 700px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
  padding-bottom: .8rem;
  border-bottom: 1px solid var(--line);
}
#quiz-header h2 {
  font-family: var(--ff-serif);
  font-size: 1.1rem;
  font-weight: 300;
  letter-spacing: .04em;
  color: var(--muted);
}
#score {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink);
}

/* open tasks */
.open-task-shell { display: grid; gap: 12px; text-align: left; }
.open-task-topline { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.open-task-title { font-family: var(--ff-serif); font-size: 1.5rem; font-weight: 300; text-align: center; margin: 0; }
.open-task-visible-hint { border: 1px solid var(--line); padding: 12px; background: var(--cream); text-align: left; }
.open-task-hidden-grid { display: grid; gap: 8px; }
.hint-card { border: 1px solid var(--line); padding: 12px; background: var(--white); text-align: left; }
.hint-card.revealed { background: var(--cream); border-color: var(--ink); }
.hint-title { font-weight: 400; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.hint-text { color: var(--ink); font-size: 14px; }
.hint-actions { margin-top: 8px; }
.hint-reveal-btn {
  border: 1px solid var(--line);
  background: var(--white);
  padding: 6px 14px;
  font-family: var(--ff-sans);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.hint-reveal-btn:hover { background: var(--cream); border-color: var(--ink); }
.hint-reveal-btn:disabled { opacity: .35; cursor: not-allowed; }
.open-task-input-wrap { display: grid; gap: 6px; }
.open-task-input-wrap label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.open-task-input {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid var(--line);
  border-radius: 0;
  padding: 11px 13px;
  font-size: 15px;
  font-family: var(--ff-sans);
  background: var(--white);
  color: var(--ink);
  transition: border-color .15s;
}
.open-task-input:focus { outline: none; border-color: var(--ink); }
.open-task-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.open-task-actions button {
  font-family: var(--ff-sans);
  font-size: 12px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--ink);
  border: 1px solid var(--ink);
  padding: .7rem 1.8rem;
  cursor: pointer;
  transition: background .18s;
}
.open-task-actions button:hover { background: var(--green); border-color: var(--green); }
.open-task-actions button:disabled { opacity: .4; cursor: not-allowed; }
.task-feedback { min-height: 22px; font-size: 13px; font-weight: 400; text-align: center; letter-spacing: .04em; }
.task-feedback.ok { color: var(--green); }
.task-feedback.bad { color: #9b3a2a; }

/* covers Y2 */
.cover-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cover-card { border: 1px solid var(--line); background: var(--white); padding: 10px; display: grid; gap: 6px; justify-items: center; }
.cover-visual { width: 100%; min-height: 140px; background: var(--cream); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.cover-visual img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-emoji { font-size: 54px; line-height: 1; }
.cover-label { font-size: 12px; color: var(--muted); text-align: center; letter-spacing: .04em; }

/* profile */
.profile-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); text-align: left; }
.profile-section h3 { font-family: var(--ff-sans); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; font-weight: 400; }
.profile-chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
.profile-chip { border: 1px solid var(--line); padding: 5px 10px; background: var(--white); font-size: 13px; color: var(--ink); }
.profile-chip.clickable { cursor: pointer; transition: background .15s, border-color .15s; }
.profile-chip.clickable:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
.profile-media-list { display: grid; gap: 6px; }
.profile-media-item { border: 1px solid var(--line); padding: 9px 12px; background: var(--white); font-size: 13px; }

/* map */
#map-title { font-family: var(--ff-serif); font-size: 1.8rem; font-weight: 300; margin-bottom: 1rem; color: var(--ink); }

/* quiz end btn */
.btn-end {
  font-family: var(--ff-sans);
  font-size: 11px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: 1px solid var(--line);
  padding: .6rem 1.4rem;
  cursor: pointer;
  margin-top: 10px;
  transition: color .15s, border-color .15s;
}
.btn-end:hover { color: var(--ink); border-color: var(--ink); }

@media (max-width: 760px) {
  .diagnostic-layout { grid-template-columns: 1fr; }
  .task-row { flex-direction: column; }
  .epoch-grid { grid-template-columns: 1fr; }
  .choice-group.cols-2 { grid-template-columns: 1fr; }
}
  /* ── TASK X — TINDER CARD ── */
.tinder-wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  user-select: none;
}

.tinder-label {
  font-family: var(--ff-sans);
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}

.tinder-question {
  font-family: var(--ff-serif);
  font-size: 1.2rem;
  font-weight: 300;
  text-align: center;
  color: var(--ink);
  line-height: 1.3;
}

.tinder-card-stage {
  width: 100%;
  position: relative;
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tinder-card {
  position: absolute;
  width: 260px;
  background: var(--white);
  border: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  cursor: grab;
  transition: box-shadow .2s;
  touch-action: none;
  will-change: transform;
}
.tinder-card:active { cursor: grabbing; }

.tinder-card-img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
  background: var(--cream);
}

.tinder-card-img-placeholder {
  width: 100%;
  height: 200px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  line-height: 1;
}

.tinder-card-name {
  padding: 10px 12px;
  font-family: var(--ff-serif);
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--ink);
  text-align: center;
  border-top: 1px solid var(--line);
}

/* swipe overlays */
.tinder-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--ff-sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .18em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity .12s;
  pointer-events: none;
}
.tinder-overlay-left  { background: rgba(155, 58, 42, .08); color: #9b3a2a; }
.tinder-overlay-right { background: rgba(45, 74, 62, .08);  color: var(--green); }

/* choices flanking the card */
.tinder-choices {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.tinder-choice {
  border: 1px solid var(--line);
  padding: 14px 10px;
  text-align: center;
  font-family: var(--ff-sans);
  font-size: 13px;
  font-weight: 300;
  color: var(--ink);
  background: var(--white);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  line-height: 1.4;
}
.tinder-choice:hover { background: var(--cream); border-color: var(--ink); }
.tinder-choice.chosen-correct { background: var(--green); border-color: var(--green); color: var(--white); }
.tinder-choice.chosen-wrong   { background: #9b3a2a; border-color: #9b3a2a; color: var(--white); }
.tinder-choice.reveal-correct { background: var(--green); border-color: var(--green); color: var(--white); }

.tinder-hint {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* profile images */
.profile-image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
  margin-top: 6px;
}
.profile-image-item {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  border: 1px solid var(--line);
}
.profile-image-placeholder {
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--cream);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}
</style>
</head>
<body>
<div id="app">

  <!-- ── EKRAN 1: TRYB ── -->
  <div id="screen-start" class="onboard-screen active">
    <p class="screen-eyebrow">Matura · Język Polski</p>
    <h1 class="screen-heading">Jak chcesz<br><em>pracować?</h1>
    <div class="choice-group cols-2">
      <button class="choice-btn" id="btn-learning" onclick="setMode('learning')">
        <span class="choice-label">Nauka</span>
        <span class="choice-sub">Przeglądaj materiał</span>
      </button>
      <button class="choice-btn" id="btn-quiz" onclick="setMode('quiz')">
        <span class="choice-label">Ćwiczenia</span>
        <span class="choice-sub">Sprawdź się</span>
      </button>
    </div>
    <div class="nav-row centered">
      <button class="btn-primary" onclick="goScreen(2)">Dalej</button>
    </div>
  </div>

  <!-- ── EKRAN 2: ZAKRES ── -->
  <div id="screen-mode" class="onboard-screen">
    <p class="screen-eyebrow">Krok 2 z 3</p>
    <h1 class="screen-heading">Wybierz<br><em>zakres</em></h1>
    <div class="choice-group cols-2">
      <button class="choice-btn active" id="btn-books" onclick="setView('books')">
        <span class="choice-label">Lektury</span>
        <span class="choice-sub">Tytuły i autorzy</span>
      </button>
      <button class="choice-btn" id="btn-motifs" onclick="setView('motifs')">
        <span class="choice-label">Motywy</span>
        <span class="choice-sub">Tematy i symbole</span>
      </button>
    </div>
    <div class="nav-row">
      <button class="btn-ghost" onclick="goScreen(1)">Wstecz</button>
      <button class="btn-primary" onclick="goScreen(3)">Dalej</button>
    </div>
  </div>

  <!-- ── EKRAN 3: EPOKI ── -->
  <div id="screen-epoch" class="onboard-screen">
    <p class="screen-eyebrow">Krok 3 z 3</p>
    <h1 class="screen-heading">Filtruj<br><em>epoki</em></h1>
    <div class="epoch-grid" id="epochFilter"></div>
    <div class="nav-row">
      <button class="btn-ghost" onclick="goScreen(2)">Wstecz</button>
      <button class="btn-primary" onclick="startApp()">Start</button>
    </div>
  </div>

  <!-- ── MAPA ── -->
  <div id="map" style="display:none; width:100%; max-width:700px;">
    <h2 id="map-title"></h2>
    <div id="list"></div>
    <br>
    <button class="btn-ghost" onclick="goScreen(1)">Menu</button>
  </div>

  <!-- ── QUIZ ── -->
  <div id="quiz" style="display:none; width:100%; max-width:700px;">
    <div id="quiz-header">
      <h2 id="quiz-label">Diagnostyka</h2>
      <span id="score">Score: 0</span>
    </div>
    <div id="quiz-content"></div>
    <button id="nextBtn" onclick="nextTask()" style="display:none">Dalej</button>
    <br>
    <button class="btn-end" onclick="goScreen(1)">Zakończ</button>
  </div>

  <!-- ── PROFIL ── -->
  <div id="profile" style="display:none; width:100%; max-width:700px;">
    <div id="profile-content"></div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
